<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>My Java App</title>
    <!-- 1. Load the CheerpJ Runtime -->
    <script src="https://cjrtnc.leaningtech.com/4.2/loader.js"></script>
</head>
<body>
    <script type="module">
        // 2. Initialize the runtime
        await cheerpjInit();

        // 3. Create a display for Swing/AWT apps (optional)
        cheerpjCreateDisplay(800, 600);

        // 4. Run the JAR from the virtual filesystem
        // Note: "/app/" refers to the root of your web server
        const queryString = window.location.search;
        
        // Create a URLSearchParams object to easily work with parameters
        const urlParams = new URLSearchParams(queryString);

        // Get specific parameter values using the .get() method
        const n = urlParams.get('name');
        var name='app';
        if (n) {
            name=n;
        }
        await cheerpjRunJar("/app/"+name+".jar");
    </script>
</body>
</html>
